[tool.black]
line-length = 100
target-version = ["py313"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "DJ"]
ignore = ["DJ001", "DJ002", "DJ008"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "postalia.settings"
python_files = ["test_*.py", "*_test.py"]
addopts = "-q"
